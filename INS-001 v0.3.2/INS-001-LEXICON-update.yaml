# INS-001 Lexical Specification
# Language, terminology, and messaging for the Semantic Cartography instrument family
# Version: 1.3.0 | Date: 2026-01-18 | Status: draft

_meta:
  version: "1.3.0"
  date: "2026-01-18"
  author: "Phronos"
  status: "draft"
  parent_brand: "BRAND.yaml"
  notes: "This lexicon extends BRAND.yaml with instrument-specific terminology. Defer to BRAND.yaml for voice, tone, and visual identity."
  changelog:
    - version: "1.3.0"
      date: "2026-01-18"
      changes:
        - "Fidelity now fully implemented for INS-001.2"
        - "INS-001.2 displays Fidelity (filled dot) + Spread (hollow dot) in results"
        - "Updated fidelity algorithm to joint constraint scoring (coverage x efficiency)"
        - "Updated fidelity interpretation bands based on implementation"
        - "Clarified INS-001.1 still uses Relevance (unchanged)"
        - "Updated intro screen language: 'Fidelity. Spread.' for step 03"
    - version: "1.2.0"
      date: "2026-01-18"
      changes:
        - "Updated to match actual implemented UI language"
        - "INS-001.1: Spread + Unconventionality + Communicability"
        - "INS-001.2: Spread only (relevance is validity gate, not user-facing)"
        - "Removed Fidelity (proposed but not implemented)"
        - "Added Unconventionality as INS-001.1 construct"
    - version: "1.1.0"
      date: "2025-01-18"
      changes:
        - "Added Fidelity as core construct for INS-001.2"
        - "Updated INS-001.1 to use Spread (not Divergence) as primary metric"

# =============================================================================
# FAMILY IDENTITY
# INS-001: Semantic Cartography
# =============================================================================

family:
  code: "INS-001"
  name: "Semantic Cartography"
  tagline: "Charting how meaning moves."

  description:
    short: "Instruments for mapping how you navigate conceptual space."
    expanded: "A family of assessments that measure divergent and convergent thinking through word association patterns—how you encode meaning, transmit it to others, and reconstruct it from sparse signals."

  scientific_basis:
    primary: "Olson et al. (2021). Naming unrelated words predicts creativity. PNAS."
    supporting:
      - "De Deyne et al. (2019). Small World of Words English word association norms."
      - "Kenett et al. (2018). Flexibility of thought in high creative individuals."
      - "Abramski et al. (2025). LLM World of Words free association norms."
    calibration: "MTH-002.1 v2.0 - Relevance and Spread Scoring"

  core_constructs:
    - name: "Spread"
      definition: "How far apart your clues are from each other."
      operationalization: "Mean pairwise semantic distance among clues only (excludes prompt words)."
      instruments: ["001.1", "001.2"]
      display_range: "0-100"
      notes: "Primary diversity metric for both instruments. Clue-only calculation isolates participant contribution from prompt difficulty."

    - name: "Fidelity"
      definition: "How well your clues jointly identify the anchor-target pair."
      operationalization: "Joint constraint score: coverage (fraction of foils eliminated) x efficiency (1 - redundancy)."
      instruments: ["001.2"]
      display_range: "0-100 (stored as 0-1)"
      threshold: 0.50
      notes: "Primary constraint metric for INS-001.2. Replaces Relevance as the user-facing metric."

    - name: "Relevance"
      definition: "How connected your clues are to the prompt."
      operationalization: "For 001.1: Mean cosine similarity to seed. For 001.2: Mean of min(sim_anchor, sim_target) per clue."
      instruments: ["001.1"]
      display_range: "0-1"
      threshold: 0.15
      notes: "User-facing for INS-001.1. For INS-001.2, retained as internal/legacy metric only."

    - name: "Unconventionality"
      definition: "How much your associations avoid predictable responses."
      operationalization: "Inverse of overlap with noise floor (most frequent associations in embedding neighborhood)."
      instruments: ["001.1"]
      levels: ["High", "Moderate", "Low"]
      notes: "High = avoided predictable associations. Low = many associations appear in typical neighborhood."

    - name: "Communicability"
      definition: "Whether meaning survives transmission to another agent."
      operationalization: "Reconstruction accuracy by partner or LLM."
      instruments: ["001.1", "001.3"]
      display: "binary (success/failure)"

    - name: "Surprisal"
      definition: "How unexpected a semantic transition is."
      operationalization: "Negative log-probability against reference network (SWOW/LWOW)."
      instruments: ["001.1", "001.2", "001.6"]

# =============================================================================
# INSTRUMENTS
# Individual assessments within the family
# =============================================================================

instruments:

  INS-001.1:
    code: "001.1"
    name: "Signal"
    headline: "Map a signal."

    task:
      short: "Describe a concept divergently—can it still be reconstructed?"
      expanded: "Given a seed concept, provide clues that are semantically diverse yet sufficient for reconstruction. Measures the tension between spread and communicability."

    what_it_measures:
      primary:
        - metric: "Spread"
          description: "How far apart your associations are from each other."
        - metric: "Unconventionality"
          description: "Whether you avoided the most predictable associations."
      secondary:
        - metric: "Communicability"
          description: "Whether LLM or human partner can reconstruct the seed."
        - metric: "Relevance"
          description: "How connected your associations are to the seed."
          internal: true  # Not prominently displayed but available

    vocabulary:
      prompt_word: "seed"
      user_input: "clues"
      alt_user_input: "associations"
      success_event: "reconstruction"

    ui_copy:
      intro_headline: "Map a signal."
      intro_step_03: "Divergence. Relevance."  # Current implementation
      what_this_measures:
        spread: "How much semantic territory your clues cover. Higher spread indicates more diverse associations."
        relevance: "How close your associations are to both the anchor and target."
      instruction: "Name concepts that describe the seed—as many directions as you can."
      completion: "See what emerges."
      no_correct_answers: "There are no correct answers—only your signal."

    scoring:
      spread:
        source: "clues-only pairwise cosine distance"
        raw_range: "20-80 (practical bounds)"
        display_range: "0-100 (normalized)"
        normalization: "((raw - 20) / 60) * 100"
        bands:
          - range: [0, 33]
            label: "Low"
            description: "Your associations were clustered together."
          - range: [33, 66]
            label: "Medium"
            description: "Moderate diversity, associated with creative thinking."
          - range: [66, 100]
            label: "High"
            description: "Highly diverse associations, associated with creative thinking."

      unconventionality:
        source: "noise floor overlap count"
        bands:
          - level: "High"
            condition: "0 overlaps"
            color: "var(--active)"
            description: "None of your associations appeared in the predictable neighborhood."
          - level: "Moderate"
            condition: "1-2 overlaps"
            color: "var(--gold)"
            description: "X of your associations appeared in the predictable neighborhood."
          - level: "Low"
            condition: "3+ overlaps"
            color: "var(--alert)"
            description: "X of your associations appeared in the predictable neighborhood."

      communicability:
        source: "LLM reconstruction (Haiku)"
        display: "binary (checkmark/X)"
        success_text: "Haiku guessed \"{seed}\" from your associations"
        failure_text: "Haiku couldn't guess \"{seed}\" from your associations"
        also_considered: "Shows other guesses LLM considered"

  INS-001.2:
    code: "001.2"
    name: "Common Ground"
    headline: "Find common ground."

    task:
      short: "Name concepts that belong to both anchor and target."
      expanded: "Given two concepts, identify clues that capture both. Measures your ability to locate semantic intersection across distant concepts while maintaining diversity."

    what_it_measures:
      primary:
        - metric: "Fidelity"
          description: "How well your clues jointly identify the anchor-target pair."
        - metric: "Spread"
          description: "How far apart your clues are from each other."
      secondary:
        - metric: "Relevance"
          description: "Mean similarity to both anchor and target."
          internal: true  # Legacy, not user-facing

    vocabulary:
      prompt_words: ["anchor", "target"]
      user_input: "clues"
      success_event: "intersection"

    ui_copy:
      intro_headline: "Find common ground."
      intro_description: "This instrument measures how you locate semantic intersection between two different conceptual domains. Choose two words and find concepts that belong to both."
      intro_step_03: "Fidelity. Spread."
      what_this_measures:
        fidelity: "How well your clues jointly identify the anchor-target pair. Higher fidelity means your clues efficiently narrow down to the correct endpoints."
        spread: "How much semantic territory your clues cover. Higher spread indicates more diverse conceptual bridges between anchor and target."
      instruction: "Name concepts that belong to both."
      completion: "See what emerges."
      no_correct_answers: "There are no correct answers—only your connections."

    results_display:
      visualization: "Connected dot plot"
      legend:
        - symbol: "filled dot"
          label: "Fidelity"
          color: "var(--gold)"
        - symbol: "hollow dot"
          label: "Spread"
          color: "var(--gold)"
      rows:
        - label: "You"
          concepts: "user clues"
        - label: "Haiku"
          concepts: "LLM baseline clues"
        - label: "Statistical"
          concepts: "lexical/embedding baseline"
        - label: "Human"
          concepts: "recipient clues (if shared)"

    scoring:
      fidelity:
        source: "joint constraint algorithm"
        algorithm: "coverage x efficiency"
        components:
          coverage: "Fraction of foil neighbors eliminated by at least one clue"
          efficiency: "1 - redundancy (how much clues overlap in eliminations)"
        foil_count: 50
        storage_range: "0-1"
        display_range: "0-100"
        threshold: 0.50
        bands:
          - range: [0, 0.50]
            label: "Poor"
            description: "Clues don't constrain the solution space."
          - range: [0.50, 0.65]
            label: "Below Average"
            description: "Some constraint, high redundancy."
          - range: [0.65, 0.75]
            label: "Average"
            description: "Reasonable triangulation."
          - range: [0.75, 0.85]
            label: "Above Average"
            description: "Efficient, complementary clues."
          - range: [0.85, 1.0]
            label: "Excellent"
            description: "Near-optimal constraint coverage."
        interpretation_text:
          below_threshold: "Your fidelity score ({score}) is below the threshold. Your clues may not sufficiently narrow down the anchor-target pair."
          template: "Your fidelity ({score}) is {label}, meaning your clues {qualifier} identify the anchor-target pair."
          qualifiers:
            excellent: "effectively"
            above_average: "effectively"
            average: "reasonably"
            below_average: "reasonably"
            poor: "don't well"

      spread:
        source: "clues-only pairwise cosine distance"
        display_range: "0-100"
        bands:
          - range: [0, 55]
            label: "Low"
          - range: [55, 62]
            label: "Below Average"
          - range: [62, 68]
            label: "Average"
          - range: [68, 72]
            label: "Above Average"
          - range: [72, 100]
            label: "High"
        calibration_notes: "Haiku-calibrated (mean = 64.4, SD = 4.6)"
        interpretation_text:
          template: "Your spread ({score}) is {label}."
          comparison: "You found more diverse bridges than Haiku (+{delta} points)."

      relevance:
        source: "mean of min(sim_anchor, sim_target) per clue"
        storage_range: "0-1"
        threshold: 0.15
        internal_only: true
        notes: "Legacy metric. Not displayed in UI. Superseded by Fidelity."

  INS-001.3:
    code: "001.3"
    name: "Triangulation"
    headline: "Locate the source."

    task:
      short: "Reconstruct a concept from another's clues."
      expanded: "Given clues provided by a partner (human or LLM), identify the original seed concept. Measures convergent thinking and semantic decoding."

    what_it_measures:
      - "Reconstruction accuracy"
      - "Convergence efficiency: how many clues required"
      - "Alignment: similarity of your reconstruction path to population norms"

    vocabulary:
      prompt_word: "clues"
      user_input: "guess"
      success_event: "reconstruction"

    ui_copy:
      instruction: "What concept do these clues describe?"
      completion: "See if you found it."
      no_correct_answers: null  # This task has a correct answer

  INS-001.4:
    code: "001.4"
    name: "Registration"
    headline: "Compare the maps."
    status: "planned"

  INS-001.5:
    code: "001.5"
    name: "Stress Test"
    headline: "Test the structure."
    status: "planned"

  INS-001.6:
    code: "001.6"
    name: "Drift"
    headline: "Chart the drift."
    status: "planned"

# =============================================================================
# SHARED VOCABULARY
# Terms used across all INS-001 instruments
# =============================================================================

glossary:

  user_facing:
    clue:
      definition: "A word you provide in response to the prompt."
      usage: "Always 'clue' or 'clues', never 'response', 'answer', or 'input'."
      alt: "associations (INS-001.1 context)"

    seed:
      definition: "The starting concept in a single-target task (001.1)."
      usage: "Use for INS-001.1. For 001.2, use 'anchor' and 'target'."

    anchor:
      definition: "The first of two concepts in a dual-target task (001.2)."
      usage: "Always paired with 'target'."

    target:
      definition: "The second of two concepts in a dual-target task (001.2)."
      usage: "Always paired with 'anchor'."

    spread:
      definition: "How far apart your clues are from each other."
      usage: "Primary metric for both INS-001.1 and INS-001.2."

    fidelity:
      definition: "How well your clues jointly identify the anchor-target pair."
      usage: "Primary constraint metric for INS-001.2 only."

    unconventionality:
      definition: "Whether your associations avoided the most predictable responses."
      usage: "INS-001.1 only. Based on noise floor overlap."

    reconstruction:
      definition: "Successfully identifying the original concept from clues."
      usage: "The goal of convergent tasks (001.1, 001.3)."

  technical:
    spread:
      plain: "How far apart your clues are from each other."
      technical: "Mean pairwise cosine distance among clues only, scaled 0-100."
      notes: "Primary metric for INS-001.1 and INS-001.2. Excludes prompt words from calculation."

    divergence:
      plain: "How spread out your clues are from each other."
      technical: "Mean pairwise cosine distance across all words (clues + prompts), scaled 0-100 (DAT convention)."
      notes: "Legacy term. Superseded by 'spread' (clue-only) which better isolates participant contribution."
      status: "deprecated - use 'spread' instead"

    fidelity:
      plain: "How well your clues identify the bridging task."
      technical: "Joint constraint score: coverage x efficiency. Coverage = fraction of 50 nearest-neighbor foils eliminated by at least one clue. Efficiency = 1 - redundancy (intersection/union of eliminations)."
      threshold: 0.50
      notes: "Replaces Relevance as the user-facing constraint metric for INS-001.2."

    relevance:
      plain: "How connected your clues are to the prompt."
      technical: "For 001.1: Mean cosine similarity to seed. For 001.2: Mean of min(sim_anchor, sim_target) per clue."
      threshold: 0.15
      notes: "User-facing for INS-001.1. For INS-001.2, retained as internal/legacy metric only. Superseded by Fidelity."

    noise_floor:
      plain: "The most predictable associations for a given word."
      technical: "Top-k nearest neighbors in embedding space, representing conventional/expected responses."
      notes: "Used to compute unconventionality in INS-001.1."

    foil:
      plain: "A wrong answer candidate used to test clue quality."
      technical: "Nearest neighbors to anchor/target in vocabulary embedding space."
      notes: "Used in fidelity computation. 50 foils per endpoint."

    coverage:
      plain: "What fraction of wrong answers your clues eliminate."
      technical: "Fraction of foils eliminated by at least one clue."
      notes: "Component of fidelity score."

    efficiency:
      plain: "Whether your clues eliminate different wrong answers."
      technical: "1 - (intersection of eliminations / union of eliminations)."
      notes: "Component of fidelity score. High efficiency = non-redundant clues."

# =============================================================================
# MESSAGING CONSTRAINTS
# =============================================================================

messaging:

  principles:
    - "The instrument reveals. Interpretation belongs to the participant."
    - "Spread is not creativity. Fidelity is not correctness."
    - "High scores are not better. They are different."
    - "We measure deviation from norms, not deviation from truth."

  forbidden_phrases:
    value_judgments:
      - "Your creativity score"
      - "More creative"
      - "Better associations"
      - "Higher fidelity is better"
      - "Correct answer" # except for 001.3

    marketing_speak:
      - "Unlock your potential"
      - "Boost your creativity"
      - "Train your brain"

    false_precision:
      - "You are X% creative"
      - "Top X% of thinkers"

  preferred_phrasing:
    - instead_of: "Your creativity score"
      use: "Your spread relative to population norms"

    - instead_of: "Good bridging"
      use: "High fidelity bridging"

    - instead_of: "Correct answer"
      use: "Successful reconstruction"

# =============================================================================
# UI PATTERNS
# =============================================================================

ui_patterns:

  buttons:
    start: "Begin Assessment"
    submit: "Submit"
    next: "Continue"
    complete: "See Results"
    retry: "Play Again"

  progress:
    step_format: "Step {n} of {total}"
    time_estimate: "~{n} minutes"

  results_headers:
    spread: "Spread"
    fidelity: "Fidelity"
    unconventionality: "Unconventionality"
    communicability: "AI Interpretation"

  calibration_notice: "Scale calibrating as we gather participant data."

  consent:
    checkbox_label: "I agree to the Terms of Service and Privacy Policy, and consent to the processing of my responses as described therein."

# =============================================================================
# METRIC DISPLAY SUMMARY
# =============================================================================

metric_display:

  ins001_1:
    primary_metrics:
      - name: "Spread"
        scale: "0-100"
        visualization: "horizontal bar with marker"
        labels: ["Low", "Medium", "High"]
      - name: "Unconventionality"
        scale: "categorical"
        visualization: "label with color"
        levels: ["Low", "Moderate", "High"]
    secondary_metrics:
      - name: "Communicability"
        visualization: "checkmark/X with text"

  ins001_2:
    primary_metrics:
      - name: "Fidelity"
        scale: "0-100 (displayed), 0-1 (stored)"
        visualization: "filled dot on number line"
        labels: ["Poor", "Below Average", "Average", "Above Average", "Excellent"]
      - name: "Spread"
        scale: "0-100"
        visualization: "hollow dot on number line"
        labels: ["Low", "Below Average", "Average", "Above Average", "High"]
    visualization_type: "connected dot plot"
    interpretation: "Text summary comparing participant to baselines"

